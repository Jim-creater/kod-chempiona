<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
<defs>
<pattern id="tr" width="120" height="120" patternUnits="userSpaceOnUse" patternTransform="rotate(-24)">
<rect x="30" y="0" width="2.5" height="120" fill="#4a86c8" opacity="0.5"/>
<rect x="40" y="0" width="2.5" height="120" fill="#4a86c8" opacity="0.5"/>
</pattern>
<linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
<stop offset="60%" stop-color="#ffffff" stop-opacity="0.5"/>
<stop offset="100%" stop-color="#ffffff" stop-opacity="0.9"/>
</linearGradient>
<mask id="mm"><rect width="1600" height="1000" fill="url(#g)"/></mask>
</defs>
<rect width="1600" height="1000" fill="url(#tr)" mask="url(#mm)"/>
</svg>